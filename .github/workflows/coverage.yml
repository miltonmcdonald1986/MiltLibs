name: Coverage (Windows)

on:
  pull_request:
  push:
    branches: [ main ]

jobs:
  coverage:
    runs-on: windows-latest

    steps:
      - uses: actions/checkout@v4

      - name: Install OpenCppCoverage
        run: |
          curl -L -o OpenCppCoverageSetup.exe https://github.com/OpenCppCoverage/OpenCppCoverage/releases/download/release-0.9.9.0/OpenCppCoverageSetup-x64-0.9.9.0.exe
          Start-Process .\OpenCppCoverageSetup.exe -ArgumentList "/VERYSILENT" -Wait

      - name: Configure (Debug)
        run: cmake -B build -A x64 -DCMAKE_BUILD_TYPE=Debug -DBUILD_TESTING=ON

      - name: Build
        run: cmake --build build --parallel

      - name: Run Coverage
        run: |
          $repoRoot = (Get-Location).Path

          $testExe = Get-ChildItem -Recurse -Filter "*tests.exe" build | Select-Object -First 1
          if (-not $testExe) { throw "Test executable not found" }

          & "C:\Program Files\OpenCppCoverage\OpenCppCoverage.exe" `
            --export_type html:coverage-report `
            --modules $repoRoot `
            --sources $repoRoot `
            --excluded_sources "$repoRoot\build" `
            --excluded_sources "$repoRoot\build\*" `
            --excluded_sources "$repoRoot\build\_deps" `
            --excluded_sources "$repoRoot\build\_deps\*" `
            --excluded_sources "*googletest*" `
            --excluded_sources "*gtest*" `
            --excluded_sources "*Windows Kits*" `
            --excluded_sources "*ucrt*" `
            --excluded_sources "*vctools*" `
            -- $testExe.Full
