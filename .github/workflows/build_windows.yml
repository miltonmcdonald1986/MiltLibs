name: Build (Windows MSVC)

on:
  pull_request:
  push:
    branches: [ main ]

jobs:
  windows-msvc:
    runs-on: windows-latest

    steps:
      - uses: actions/checkout@v4

      - name: Configure (CMake)
        run: cmake -B build -A x64 -DCMAKE_BUILD_TYPE=Release

      - name: Build
        run: cmake --build build --parallel
