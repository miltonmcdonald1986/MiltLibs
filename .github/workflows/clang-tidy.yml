name: clang-tidy (Linux)

on:
  push:
    branches: [ main ]
  pull_request:
  workflow_dispatch:

jobs:
  tidy:
    runs-on: ubuntu-latest

    steps:
    - uses: actions/checkout@v4

    - name: Install Wayland dependencies
      run: |
        sudo apt-get update
        sudo apt-get install -y libwayland-bin wayland-protocols libwayland-dev libxkbcommon-dev

    - name: Install clang-tidy + fd
      run: |
        sudo apt-get update
        sudo apt-get install -y clang-tidy fd-find

    - name: Configure (generate compile_commands.json)
      run: cmake -B build -DCMAKE_EXPORT_COMPILE_COMMANDS=ON

    - name: Run clang-tidy on libs/
      run: |
        fdfind . libs -e cpp -e h -e hpp \
          -X clang-tidy {} -- \
          -p build \
          -checks=-*,modernize-*,readability-*
